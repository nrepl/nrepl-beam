name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dialtone:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dialtone
    strategy:
      fail-fast: false
      matrix:
        otp: ['26', '27', '28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.25'
      - uses: actions/cache@v4
        with:
          path: |
            dialtone/_build
            ~/.cache/rebar3
          key: dialtone-${{ runner.os }}-otp${{ matrix.otp }}-${{ hashFiles('dialtone/rebar.config') }}
      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 ct
      - run: rebar3 as test proper -n 300
      - run: rebar3 xref
      - run: rebar3 dialyzer

  repartee:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repartee
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.15'
            otp: '26'
          - elixir: '1.16'
            otp: '26'
          - elixir: '1.17'
            otp: '27'
          - elixir: '1.18'
            otp: '27'
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - uses: actions/cache@v4
        with:
          path: |
            repartee/_build
            repartee/deps
          key: repartee-${{ runner.os }}-e${{ matrix.elixir }}-otp${{ matrix.otp }}-${{ hashFiles('repartee/mix.lock', 'repartee/mix.exs') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test
